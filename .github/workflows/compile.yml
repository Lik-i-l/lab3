name: Test Math Task

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-math:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Compile TypeScript to JavaScript
        run: npm run build
      - name: Show compiled JavaScript
        run: cat dist/math.js
      - name: Run the program
        run: node dist/math.js
      - name: Test Math
        run: npm test
